<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wei-Ping Chan</title>
  <meta name="description" content="Welcome to Wei-Ping Chan's personal website.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      background-image: url('https://lh3.googleusercontent.com/d/1RbbqevU8LwwauUS1pct3OJ3ERcl1w8Kt');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
    }
    .overlay {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
      color: #fff;
      background: linear-gradient(180deg, rgba(15,23,42,.55) 0%, rgba(15,23,42,.25) 45%, rgba(15,23,42,.65) 100%);
    }
    .eyebrow {
      letter-spacing: .35em;
      font-size: .8rem;
      text-transform: uppercase;
      opacity: .85;
      margin-bottom: 14px;
    }
    .name {
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      font-weight: 800;
      line-height: 1.1;
      text-shadow: 0 2px 20px rgba(0,0,0,.45);
    }
    .tagline {
      margin-top: 14px;
      font-size: clamp(.95rem, 2.4vw, 1.2rem);
      font-weight: 300;
      max-width: 36rem;
      opacity: .95;
    }
    .button {
      margin-top: 34px;
      padding: 13px 30px;
      background: transparent;
      color: #fff;
      border: 2px solid rgba(255,255,255,.85);
      border-radius: 9999px;
      cursor: pointer;
      font-size: 1rem;
      letter-spacing: .03em;
      transition: all .2s ease;
    }
    .button:hover {
      background: #fff;
      color: #14294b;
      transform: translateY(-2px);
      box-shadow: 0 12px 26px -10px rgba(0,0,0,.6);
    }
    .hint {
      position: absolute;
      bottom: 22px;
      font-size: .72rem;
      opacity: .65;
    }
    @media (max-width: 768px) {
      body {
        background-size: auto 100%;
        background-position: calc(50% + 180px) center;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <p class="eyebrow">Welcome</p>
    <h1 class="name">Wei-Ping Chan</h1>
    <p class="tagline">Exploratory Data Scientist &amp; Interdisciplinary Researcher — From Nature to Society</p>
    <button class="button" onclick="redirectToIndex()">Know More About Me →</button>
    <p class="hint">Entering automatically in a few seconds…</p>
  </div>

  <script>
    setTimeout(() => { window.location.href = 'home.html'; }, 20000);
    function redirectToIndex() { window.location.href = 'home.html'; }
  </script>
</body>
</html>
